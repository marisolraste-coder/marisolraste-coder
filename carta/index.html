<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Nuestra carta | Le Miski</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--ink:#102443;--cream:#fbf6ee;--sand:#eddfca;--gold:#c99435;--line:rgba(16,36,67,.16)}*{box-sizing:border-box}html,body{min-height:100%;margin:0}body{background:var(--cream);color:var(--ink);font-family:"DM Sans",sans-serif;overflow-x:hidden}a{color:inherit;text-decoration:none}.eyebrow{font-size:.68rem;font-weight:700;letter-spacing:.19em;text-transform:uppercase;color:var(--gold)}.site-header{min-height:78px;display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:1rem 6vw;border-bottom:1px solid var(--line);background:#fffaf4}.brand{font:600 clamp(1.65rem,3vw,2rem)/1 "Playfair Display",serif;letter-spacing:-.06em;white-space:nowrap}.brand small{font:600 .62rem/1 "DM Sans",sans-serif;letter-spacing:.16em;text-transform:uppercase;margin-left:.35rem}.home-link{font-size:.8rem;font-weight:700;white-space:nowrap}.menu-main{padding:clamp(1.7rem,3vw,2.8rem) 6vw 2rem}.menu-intro{max-width:700px;margin-bottom:1.35rem}.menu-intro h1{font:500 clamp(2.25rem,4vw,4rem)/1.04 "Playfair Display",serif;letter-spacing:-.055em;margin:.55rem 0}.menu-intro p{margin:0;color:#58657a;line-height:1.65}.book-viewer{height:calc(100vh - 130px);min-height:500px;display:grid;grid-template-rows:minmax(0,1fr) auto;gap:1rem;padding:clamp(.7rem,2vw,1.5rem);background:#f5ede1;border:1px solid var(--line);box-shadow:0 18px 50px rgba(16,36,67,.09)}.page-stage{min-height:0;display:flex;align-items:center;justify-content:center;overflow:hidden}.page-image{width:100%;height:100%;display:block;object-fit:contain;opacity:1;transform:translateX(0);transition:opacity .22s ease,transform .22s ease}.page-image.is-changing{opacity:0;transform:translateX(10px)}.viewer-controls{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:1rem}.page-button,.fullscreen-button{appearance:none;border:1px solid rgba(16,36,67,.28);background:#fffaf4;color:var(--ink);min-height:42px;padding:.65rem .9rem;font:700 .78rem/1 "DM Sans",sans-serif;letter-spacing:.04em;cursor:pointer;transition:background .2s ease,color .2s ease,border-color .2s ease}.page-button:hover:not(:disabled),.fullscreen-button:hover{background:var(--ink);border-color:var(--ink);color:#fffaf4}.page-button:disabled{opacity:.35;cursor:not-allowed}.page-button.next{justify-self:end}.page-count{font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#58657a;text-align:center;white-space:nowrap}.fullscreen-button{justify-self:end;background:transparent;border:0;padding:.65rem 0;color:var(--gold)}.book-viewer:fullscreen{height:100vh;max-height:none;border:0;padding:2rem;background:var(--cream)}.book-viewer:fullscreen .page-stage{height:100%}@media(max-width:700px){.site-header{padding:1rem 5vw}.brand small{display:none}.home-link{font-size:.74rem}.menu-main{padding:1.5rem 5vw}.menu-intro{margin-bottom:1rem}.book-viewer{height:calc(100vh - 130px);min-height:500px;padding:.65rem;gap:.7rem}.viewer-controls{grid-template-columns:1fr auto 1fr;gap:.55rem}.page-button{min-width:44px;padding:.65rem}.page-button span{display:none}.fullscreen-button{display:none}.page-count{font-size:.7rem}}@media(prefers-reduced-motion:reduce){.page-image{transition:none}}
  </style>
</head>
<body>
  <header class="site-header"><a class="brand" href="/">Le Miski <small>pastelería</small></a><a class="home-link" href="/">← Volver a la web</a></header>
  <main class="menu-main">
    <section class="menu-intro" aria-labelledby="carta-titulo"><span class="eyebrow">Nuestra carta</span><h1 id="carta-titulo">Descubre cada colección, página a página.</h1><p>Usa las flechas, el teclado o desliza en tu celular para recorrer la carta.</p></section>
    <section class="book-viewer" id="bookViewer" aria-label="Visor de la carta de Le Miski">
      <div class="page-stage"><img class="page-image" id="pageImage" src="../WhatsApp Image 2026-07-18 at 10.11.50 AM.jpeg" alt="Página 1 de la carta de Le Miski"></div>
      <div class="viewer-controls"><button class="page-button previous" id="previousPage" type="button" aria-label="Página anterior" disabled>← <span>Anterior</span></button><span class="page-count" id="pageCount" aria-live="polite">Página 1 de 7</span><div><button class="fullscreen-button" id="fullscreenButton" type="button">Pantalla completa</button><button class="page-button next" id="nextPage" type="button" aria-label="Página siguiente"><span>Siguiente</span> →</button></div></div>
    </section>
  </main>
  <script>
    (()=>{const pages=[
      {src:'../WhatsApp Image 2026-07-18 at 10.11.50 AM.jpeg',alt:'Página 1 de la carta de Le Miski: selección de postres artesanales'},
      {src:'../WhatsApp Image 2026-07-18 at 10.11.53 AM.jpeg',alt:'Página 2 de la carta de Le Miski: bocaditos artesanales'},
      {src:'../WhatsApp Image 2026-07-18 at 10.11.52 AM (3).jpeg',alt:'Página 3 de la carta de Le Miski: alfajores personalizados'},
      {src:'../WhatsApp Image 2026-07-18 at 10.11.52 AM (2).jpeg',alt:'Página 4 de la carta de Le Miski: crumbles artesanales'},
      {src:'../WhatsApp Image 2026-07-18 at 10.11.52 AM (1).jpeg',alt:'Página 5 de la carta de Le Miski: pies y tartaletas'},
      {src:'../WhatsApp Image 2026-07-18 at 10.11.52 AM.jpeg',alt:'Página 6 de la carta de Le Miski: colección vainilla'},
      {src:'../WhatsApp Image 2026-07-18 at 10.11.53 AM (1).jpeg',alt:'Página 7 de la carta de Le Miski: mille-feuille de picarón'}
    ];let index=0,touchStartX=0;const image=document.getElementById('pageImage'),previous=document.getElementById('previousPage'),next=document.getElementById('nextPage'),count=document.getElementById('pageCount'),viewer=document.getElementById('bookViewer'),fullscreen=document.getElementById('fullscreenButton');const preload=position=>{if(position<0||position>=pages.length)return;const preloadImage=new Image();preloadImage.src=pages[position].src};const render=()=>{image.classList.add('is-changing');window.setTimeout(()=>{const page=pages[index];image.src=page.src;image.alt=page.alt;count.textContent=`Página ${index+1} de ${pages.length}`;previous.disabled=index===0;next.disabled=index===pages.length-1;preload(index-1);preload(index+1);image.classList.remove('is-changing')},150)};const move=direction=>{const target=index+direction;if(target<0||target>=pages.length)return;index=target;render()};previous.addEventListener('click',()=>move(-1));next.addEventListener('click',()=>move(1));document.addEventListener('keydown',event=>{if(event.key==='ArrowLeft')move(-1);if(event.key==='ArrowRight')move(1)});viewer.addEventListener('touchstart',event=>{touchStartX=event.changedTouches[0].screenX},{passive:true});viewer.addEventListener('touchend',event=>{const distance=event.changedTouches[0].screenX-touchStartX;if(Math.abs(distance)>45)move(distance<0?1:-1)},{passive:true});fullscreen.addEventListener('click',()=>{if(document.fullscreenElement)document.exitFullscreen();else viewer.requestFullscreen?.()});preload(1)})();
  </script>
</body>
</html>
